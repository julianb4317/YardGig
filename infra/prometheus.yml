global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "yardgig-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]
        labels:
          service: "yardgig-api"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
